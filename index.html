<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>International Food Court</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>

  <!-- Header -->
  <header class="site-header">
    <div class="header-logo">
      <img src="images/logos/food-court-logo.png" alt="International Food Court" />
    </div>
  </header>

  <!-- Restaurant Grid -->
  <main class="main-content">
    <div class="shop-grid">

      <!-- 1. Bristo Bakehouse -->
      <a class="shop-card" href="shops/bristo-bakehouse.html">
        <img src="images/logos/bristo-bakehouse.png" alt="Bristo Bakehouse" />
        <span class="shop-name">Bristo Bakehouse</span>
      </a>

      <!-- 2. Mama Makan -->
      <a class="shop-card" href="shops/mama-makan.html">
        <img src="images/logos/mama-makan.png" alt="Mama Makan" />
        <span class="shop-name">Mama Makan</span>
      </a>

      <!-- 3. Kung Food -->
      <a class="shop-card" href="shops/kung-food.html">
        <img src="images/logos/kung-food.png" alt="Kung Food" />
        <span class="shop-name">Kung Food</span>
      </a>

      <!-- 4. Ceylon Bites -->
      <a class="shop-card" href="shops/ceylon-bites.html">
        <img src="images/logos/ceylon-bites.png" alt="Ceylon Bites" />
        <span class="shop-name">Ceylon Bites</span>
      </a>

      <!-- 5. Try India -->
      <a class="shop-card" href="#">
        <img src="images/logos/try-india.png" alt="Try India" />
        <span class="shop-name">Try India</span>
      </a>

      <!-- 6. Crispy Corner -->
      <a class="shop-card" href="#">
        <img src="images/logos/crispy-corner.png" alt="Crispy Corner" />
        <span class="shop-name">Crispy Corner</span>
      </a>

      <!-- 7. Pizzaria -->
      <a class="shop-card" href="#">
        <img src="images/logos/pizzaria.png" alt="Pizzaria" />
        <span class="shop-name">Pizzaria</span>
      </a>

      <!-- 8. Fizz & Folly -->
      <a class="shop-card" href="#">
        <img src="images/logos/fizz-folly.png" alt="Fizz &amp; Folly" />
        <span class="shop-name">Fizz &amp; Folly</span>
      </a>

    </div>

    <!-- Other Services -->
    <div class="services-section">
      <h2 class="services-title">Also In Our Centre</h2>
      <div class="services-grid">

        <a class="service-card" href="#">
          <img src="images/logos/western-union.png" alt="Western Union" />
          <span class="shop-name">Western Union</span>
        </a>

        <a class="service-card" href="#">
          <img src="images/logos/dominion-travels.png" alt="Dominion Travels" />
          <span class="shop-name">Dominion Travels</span>
        </a>

      </div>
    </div>
  </main>

  <!-- Footer -->
  <footer class="site-footer">
    <p>International Food Court &mdash; Taste the World. Love NZ.</p>
  </footer>

</body>
</html>
